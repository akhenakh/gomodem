# Basic Dire Wolf configuration for file decoding

# Define a dummy callsign since we are just decoding
MYCALL N0CALL

# Use a null audio device since we are supplying a WAV file via the command line
ADEVICE null null

# Configure Channel 0
CHANNEL 0

# 1200 baud AFSK modem (standard for VHF packet/APRS)
MODEM 1200

# Print decoded frames to the console
# AGWPE and KISS ports are disabled for this simple test
AGWPORT 0
KISSPORT 0
